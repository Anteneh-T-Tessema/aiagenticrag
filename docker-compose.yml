version: '3.8'

services:
  # LexiSwarm Backend & Frontend
  lexiswarm:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - COURTLISTENER_API_KEY=${COURTLISTENER_API_KEY}
    depends_on:
      - ollama

  # Local Inference Engine
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
